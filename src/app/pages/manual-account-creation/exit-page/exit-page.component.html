<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">
    <h1 class="govuk-heading-l">Unsaved changes</h1>
    <p class="govuk-body">
      WARNING: You have unsaved changes. Press Cancel to go back and save these changes, or OK to lose these changes.
    </p>
    <p class="govuk-body">
      <app-govuk-button
        buttonClasses="govuk-button--secondary govuk-!-margin-right-3"
        buttonId="clearForm"
        (buttonClickEvent)="handleCancelClick()"
      >
        Cancel</app-govuk-button
      >
      <app-govuk-button
        buttonClasses="govuk-button--warning govuk-!-margin-right-3"
        buttonId="clearForm"
        (buttonClickEvent)="handleOkClick()"
      >
        Ok</app-govuk-button
      >
    </p>
  </div>
</div>
