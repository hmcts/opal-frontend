<div class="govuk-grid-column-full">
  <h2 [class]="style.heading">History and notes</h2>
  <hr [class]="style.hr" />

  <app-fines-acc-minor-creditor-details-history-and-notes-filter
    [filterForm]="filterForm"
    [filterOpen]="filterOpen"
    (filterApplied)="handleFilterApplied($event)"
    (filterOpenChange)="handleFilterOpenChange($event)"
  ></app-fines-acc-minor-creditor-details-history-and-notes-filter>

  @if (historyAndNotesTabData$ | async; as historyAndNotesTabData) {
    <app-fines-acc-minor-creditor-details-history-and-notes-table
      [tabData]="historyAndNotesTabData"
    ></app-fines-acc-minor-creditor-details-history-and-notes-table>
  }
</div>
