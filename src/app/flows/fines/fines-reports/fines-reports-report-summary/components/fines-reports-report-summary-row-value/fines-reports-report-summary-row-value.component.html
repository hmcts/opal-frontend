@switch (row().type) {
  @case ('currency') {
    <p class="govuk-body">{{ numberValue() | currency: 'GBP' }}</p>
  }
  @case ('dateTime') {
    <p class="govuk-body">
      {{ numberValue() | date: "dd MMM yyyy 'at' HH:mm" }}
    </p>
  }
  @case ('notProvided') {
    <app-fines-not-provided></app-fines-not-provided>
  }
  @case ('number') {
    <p class="govuk-body">{{ numberValue() | number }}</p>
  }
  @default {
    <p class="govuk-body">{{ stringValue() }}</p>
  }
}
