<div class="govuk-grid-column-two-thirds">
  <h1 class="govuk-heading-l">Report summary</h1>

  <dl class="govuk-summary-list">
    <div class="govuk-summary-list__row">
      <dt class="govuk-summary-list__key">Report ID</dt>
      <dd class="govuk-summary-list__value">{{ reportId }}</dd>
    </div>
    <div class="govuk-summary-list__row">
      <dt class="govuk-summary-list__key">Report instance ID</dt>
      <dd class="govuk-summary-list__value">{{ reportInstanceId }}</dd>
    </div>
  </dl>
</div>
