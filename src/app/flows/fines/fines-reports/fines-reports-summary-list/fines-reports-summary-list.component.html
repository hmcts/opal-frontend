    <div class="govuk-grid-column-three-quarters">
      <h1 class="govuk-heading-l">{{ pageHeading }}</h1>
    </div>

        <button buttonId="create-report-button" opalLibGovukButton (click)="handleCreateReport()">Create report</button>
      </div>
    }
  </div>
</div>
