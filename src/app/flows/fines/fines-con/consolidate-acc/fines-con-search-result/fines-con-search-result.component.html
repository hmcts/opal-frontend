<div class="govuk-grid-column-full">
  @if (searchResults$ | async; as searchResults) {
    @if (searchResults.tableData.length > 0) {
      <app-fines-con-search-result-defendant-table-wrapper
        [tableData]="searchResults.tableData"
        [checksByAccountId]="searchResults.checksByAccountId"
        [existingSortState]="defendantsSort"
        (accountIdClicked)="onAccountIdClick($event)"
      ></app-fines-con-search-result-defendant-table-wrapper>
    } @else {
      <h2 class="govuk-heading-m">There are no matching results</h2>
    }
  }
</div>
