apiVersion: v2
appVersion: '1.0'
description: A Helm chart for opal-frontend
name: opal-frontend
home: https://github.com/hmcts/opal-frontend/
version: 0.0.325
maintainers:
  - name: HMCTS Opal team
dependencies:
  - name: nodejs
    version: 3.2.1
    repository: 'oci://hmctsprod.azurecr.io/helm'
  - name: redis
    version: 25.3.11
    repository: 'oci://registry-1.docker.io/bitnamicharts'
    condition: redis.enabled
  - name: postgresql
    version: 18.5.23
    repository: 'oci://registry-1.docker.io/bitnamicharts'
    condition: postgresql.enabled
  - name: opal-fines-service
    version: 0.0.84
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: opal-fines-service.enabled
  - name: servicebus
    version: 1.2.2
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: opal-fines-service.enabled

